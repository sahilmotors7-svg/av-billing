<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AV TECHNOLOGY | Professional Tax Invoice</title>
  <!-- html2pdf + html2canvas for reliable PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef2f8;
      font-family: 'Segoe UI', 'Roboto', 'Inter', system-ui, sans-serif;
      padding: 20px 16px;
      display: flex;
      justify-content: center;
    }

    .app-container {
      max-width: 210mm;
      width: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .tabs {
      display: flex;
      gap: 8px;
      background: #f9fbfd;
      padding: 14px 24px 0 24px;
      border-bottom: 2px solid #e2edf5;
    }
    .tab-btn {
      background: none;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 30px 30px 0 0;
      cursor: pointer;
      color: #2c3e66;
      transition: 0.2s;
    }
    .tab-btn.active {
      background: white;
      color: #0f3b5c;
      border-bottom: 3px solid #0f3b5c;
    }
    .tab-pane {
      display: none;
      padding: 28px 24px;
    }
    .tab-pane.active-pane {
      display: block;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-weight: 700;
      font-size: 0.75rem;
      color: #1e4a76;
      letter-spacing: 0.3px;
    }
    .field input, .field select {
      padding: 12px 14px;
      border: 1.5px solid #cbdbe6;
      border-radius: 18px;
      font-size: 0.9rem;
      background: white;
    }
    .field input:focus {
      outline: none;
      border-color: #1e4a76;
      box-shadow: 0 0 0 2px rgba(30,74,118,0.2);
    }

    .items-wrapper {
      overflow-x: auto;
      margin: 18px 0 12px;
      border-radius: 20px;
      border: 1px solid #e2edf2;
    }
    .items-table {
      width: 100%;
      min-width: 580px;
      border-collapse: collapse;

    }
    .items-table th, .items-table td {

    .items-table th {
      background: #f0f6fe;
      font-weight: 800;
      color: #0f3b5c;
    }
    .items-table input {
      width: 100%;
      padding: 7px 4px;
      border: 1px solid #cbdbe6;
      border-radius: 14px;
      text-align: center;
    }
    .add-row-btn {
      background: #0f3b2c;
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 6px;
    }
    .remove-row {
      background: #b91c1c;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 5px 12px;
      font-weight: bold;
      cursor: pointer;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin: 28px 0 20px;

    .btn-primary {
      background: #1e4a76;
      color: white;
      padding: 12px 28px;

      font-weight: 700;

      border: none;

    .btn-secondary { background: #4a5568; }
    .btn-pdf { background: #c2410c; }
    .btn-share { background: #1e6f5c; }

    .invoice-preview {
      background: white;
      margin-top: 30px;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 20px 24px;
    }

    /* PRINT STYLES - clean A4 */
    @media print {
      body { background: white; padding: 0; margin: 0; }
      .app-container { max-width: 100%; box-shadow: none; border-radius: 0; }
      .tabs, .action-buttons, .add-row-btn, .remove-row, .tab-btn, .form-grid, .items-wrapper, .btn-primary, .btn-pdf, .btn-share, #previewActionButtons {
        display: none !important;
      }
      .invoice-preview { margin: 0; padding: 0.2in; box-shadow: none; }
      @page { size: A4; margin: 0.2in; }
      body * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    /* ========== PREMIUM PROFESSIONAL INVOICE STYLES ========== */
    .tax-invoice-title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #1f3b4c;
      margin-bottom: 12px;
      border-bottom: 2px solid #cfdfed;
      display: inline-block;
      width: auto;
      padding-bottom: 6px;
    }
    .brand-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .brand-name {
      font-size: 1.9rem;
      font-weight: 800;
      color: #003153;
    }
    .brand-tag {
      font-size: 0.7rem;
      color: #2c5a7a;

    }
    .company-details {
      font-size: 0.7rem;
      color: #2d3e50;
      margin-top: 6px;
    }
    .company-details i, .company-details em {

    }
    /* Two-column layout */
    .info-grid-pro {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      background: #fafcff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 18px 24px;
      margin: 20px 0;
      gap: 24px;
    }
    .info-left {
      flex: 2;
      min-width: 220px;
    }
    .info-right {
      flex: 1.5;
      min-width: 200px;
      border-left: 1px solid #e2e8f0;
      padding-left: 24px;
    }
    .info-row {
      display: flex;
      margin-bottom: 12px;
      font-size: 0.82rem;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .info-label {
      font-weight: 800;
      width: 110px;
      color: #1f4a6e;
    }
    .info-value {
      font-weight: 500;
      color: #1e293b;
      word-break: break-word;
    }
    .customer-name-cap {
      text-transform: uppercase;
      font-weight: 800;
      font-size: 1rem;
      color: #0f3b5c;
    }
    .items-table-preview {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 0.75rem;
    }
    .items-table-preview th, .items-table-preview td {
      border: 1px solid #cfdfed;
      padding: 8px 6px;
      text-align: center;
    }
    .items-table-preview th {
      background: #1e4a76;
      color: white;
      font-weight: 700;
    }
    .word-amount {
      background: #eef2ff;
      padding: 8px 14px;
      border-radius: 28px;
      margin: 12px 0;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .total-row {
      background: #fef9e3;
      font-weight: 800;
    }
    /* Realistic stamp with dotted effect */
    .stamp-sign-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-top: 35px;
      gap: 25px;
    }
    .realistic-stamp {
      width: 85px;
      height: 85px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(30, 64, 175, 0.12), rgba(30, 64, 175, 0.28));
      border: 2.5px double #1e3a8a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 800;
      color: #1e3a8a;
      font-size: 0.6rem;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
      transform: rotate(-6deg);
      box-shadow: 0 3px 8px rgba(0,0,0,0.1), inset 0 0 5px rgba(30,64,175,0.2);
      backdrop-filter: blur(0.3px);
      position: relative;
      overflow: hidden;
    }
    .realistic-stamp span:first-child {
      font-size: 0.7rem;
      letter-spacing: 1px;
      border-bottom: 1px solid #2563eb;
      padding-bottom: 3px;
      margin-bottom: 4px;
    }
    .realistic-stamp::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      right: 2px;
      bottom: 2px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30,64,175,0.08) 1px, transparent 1px);
      background-size: 4px 4px;
      pointer-events: none;
    }
    .signature-box {
      text-align: right;
      border-top: 2px dashed #4b5563;
      min-width: 170px;
      padding-top: 8px;
      font-weight: 600;
      font-size: 0.75rem;
    }
    .terms {
      font-size: 0.68rem;
      background: #fef7e0;
      padding: 10px;
      border-radius: 16px;
      margin: 12px 0;
    }
    @media (max-width: 700px) {
      .info-left, .info-right { flex: 1; border-left: none; padding-left: 0; }
      .info-grid-pro { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="tabs">
    <button class="tab-btn active" data-tab="create">📄 Create Invoice</button>
    <button class="tab-btn" data-tab="view">🔍 Retrieve Invoice</button>
  </div>

  <!-- CREATE TAB -->
  <div id="createTab" class="tab-pane active-pane">
    <div class="form-grid">
      <div class="field"><label>Invoice No. (Year/Seq)</label><input type="text" id="invoiceNoManual" placeholder="INV-26/001"></div>
      <div class="field"><label>Customer Name (M/S) *</label><input type="text" id="customerName" placeholder="M/s SHARMA ENTERPRISES"></div>
      <div class="field"><label>Customer GSTIN</label><input type="text" id="custGstin" placeholder="07ABCFG1234F1Z"></div>
      <div class="field"><label>State Name (auto code)</label><input type="text" id="stateName" placeholder="Delhi" value="Delhi"></div>
      <div class="field"><label>State Code</label><input type="text" id="stateCode" placeholder="07" readonly style="background:#f1f5f9;"></div>
      <div class="field"><label>Vehicle No.</label><input type="text" id="vehicleNo" placeholder="DL 01 AB 5678"></div>
      <div class="field"><label>Date of Delivery</label><input type="date" id="deliveryDate"></div>
      <div class="field"><label>Place of Supply</label><input type="text" id="placeSupply" placeholder="New Delhi"></div>
      <div class="field"><label>Transport Mode</label><input type="text" id="transportMode" placeholder="Road / Van"></div>
      <div class="field"><label>Cheque No.</label><input type="text" id="chequeNo"></div>
      <div class="field"><label>Bank & Branch</label><input type="text" id="bankBranch" placeholder="SBI, Main Branch"></div>
      <div class="field"><label>Cartage (₹) Labour & others</label><input type="number" id="cartage" value="0" step="1"></div>
    </div>

    <div style="font-weight:800; margin-bottom:6px;">📦 Invoice Items</div>
    <div class="items-wrapper">
      <table class="items-table" id="itemsTable">
        <thead><tr><th>S.No</th><th>PARTICULARS</th><th>HSN CODE</th><th>QTY</th><th>RATE (₹)</th><th>AMOUNT (₹)</th><th></th></tr></thead>
        <tbody id="itemsBody"></tbody>
      </table>
    </div>
    <button type="button" class="add-row-btn" id="addRowBtn">+ Add Product / Service</button>

    <div class="action-buttons">
      <button class="btn-primary" id="generateInvoiceBtn">💾 Generate & Save Invoice</button>
      <button class="btn-primary btn-secondary" id="resetFormBtn">⟳ Reset Fields</button>
    </div>

    <div id="invoicePreview" class="invoice-preview" style="display: none;"></div>
  </div>

  <!-- VIEW TAB -->
  <div id="viewTab" class="tab-pane">
    <div class="form-grid">
      <div class="field"><label>Enter Invoice Number</label><input type="text" id="searchInvNo" placeholder="e.g., INV-26/001"></div>
    </div>
    <button class="btn-primary" id="fetchInvoiceBtn">🔎 Load Invoice</button>
    <div id="pastInvoiceContainer" style="margin-top: 30px;"></div>
  </div>
</div>

<script>
  // ---------- CONFIGURATION ----------
  // ✅ Your actual Google Apps Script URL (already inserted)
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyhNiImSpG2FhBpV5_qhxarSn3pg8C8elMVQP3FJeyQtOTNL_kOd6OaBxSuzTsZVvRHlA/exec";
  const USE_MOCK = false;   // false = real cloud storage

  let itemsArray = [{ desc: "", hsn: "", qty: 1, rate: 0, amount: 0 }];

  // Number to Indian Rupees words
  function numberToWords(num) {
    if (num === 0) return "Zero Rupees Only";
    const ones = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
    const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
    function convertLessThanThousand(n) {
      if (n === 0) return "";
      if (n < 20) return ones[n] + " ";
      if (n < 100) return tens[Math.floor(n/10)] + " " + (n%10 !== 0 ? ones[n%10] + " " : "");
      return ones[Math.floor(n/100)] + " Hundred " + (n%100 !== 0 ? convertLessThanThousand(n%100) : "");
    }
    let rupees = Math.floor(num);
    let paise = Math.round((num - rupees) * 100);
    let result = "";
    if (rupees >= 10000000) result += convertLessThanThousand(Math.floor(rupees/10000000)) + "Crore ";
    rupees %= 10000000;
    if (rupees >= 100000) result += convertLessThanThousand(Math.floor(rupees/100000)) + "Lakh ";
    rupees %= 100000;
    if (rupees >= 1000) result += convertLessThanThousand(Math.floor(rupees/1000)) + "Thousand ";
    rupees %= 1000;
    if (rupees >= 100) result += convertLessThanThousand(Math.floor(rupees/100)) + "Hundred ";
    rupees %= 100;
    if (rupees > 0) result += convertLessThanThousand(rupees);
    result = result.trim() + " Rupees";
    if (paise > 0) result += " and " + convertLessThanThousand(paise).trim() + " Paise";
    return result + " Only";
  }

  function renderItemsTable() {
    const tbody = document.getElementById('itemsBody');
    tbody.innerHTML = '';
    itemsArray.forEach((item, idx) => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = idx+1;
      row.insertCell(1).innerHTML = `<input type="text" class="item-desc" data-idx="${idx}" value="${escapeHtml(item.desc)}" placeholder="Product / Service">`;
      row.insertCell(2).innerHTML = `<input type="text" class="item-hsn" data-idx="${idx}" value="${escapeHtml(item.hsn)}" placeholder="HSN">`;
      row.insertCell(3).innerHTML = `<input type="number" class="item-qty" data-idx="${idx}" value="${item.qty}" step="1" min="0">`;
      row.insertCell(4).innerHTML = `<input type="number" class="item-rate" data-idx="${idx}" value="${item.rate}" step="1" min="0">`;
      row.insertCell(5).innerHTML = `<span class="item-amount" data-idx="${idx}">${item.amount.toFixed(2)}</span>`;
      const delCell = row.insertCell(6);
      if (itemsArray.length > 1) {
        const delBtn = document.createElement('button');
        delBtn.innerText = '✖';
        delBtn.className = 'remove-row';
        delBtn.onclick = () => removeItemRow(idx);
        delCell.appendChild(delBtn);
      }
    });
    attachItemEvents();
    updateAllAmounts();
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  function attachItemEvents() {
    document.querySelectorAll('.item-desc').forEach(inp => inp.addEventListener('input', function(e) { let idx = parseInt(this.dataset.idx); itemsArray[idx].desc = this.value; updateAmount(idx); triggerPreviewUpdate(); }));
    document.querySelectorAll('.item-hsn').forEach(inp => inp.addEventListener('input', function(e) { let idx = parseInt(this.dataset.idx); itemsArray[idx].hsn = this.value; triggerPreviewUpdate(); }));
    document.querySelectorAll('.item-qty').forEach(inp => inp.addEventListener('input', function(e) { let idx = parseInt(this.dataset.idx); itemsArray[idx].qty = parseFloat(this.value) || 0; updateAmount(idx); triggerPreviewUpdate(); }));
    document.querySelectorAll('.item-rate').forEach(inp => inp.addEventListener('input', function(e) { let idx = parseInt(this.dataset.idx); itemsArray[idx].rate = parseFloat(this.value) || 0; updateAmount(idx); triggerPreviewUpdate(); }));
  }

  function updateAmount(idx) {
    let qty = itemsArray[idx].qty || 0;
    let rate = itemsArray[idx].rate || 0;
    let amt = qty * rate;
    itemsArray[idx].amount = amt;
    const span = document.querySelector(`.item-amount[data-idx="${idx}"]`);
    if (span) span.innerText = amt.toFixed(2);
  }

  function updateAllAmounts() { itemsArray.forEach((_, i) => updateAmount(i)); }
  function removeItemRow(idx) { if (itemsArray.length <= 1) return; itemsArray.splice(idx, 1); renderItemsTable(); triggerPreviewUpdate(); }
  function addNewItem() { itemsArray.push({ desc: "", hsn: "", qty: 1, rate: 0, amount: 0 }); renderItemsTable(); triggerPreviewUpdate(); }
  function getItemsArrayFromState() { return itemsArray.filter(it => it.desc.trim() !== "").map((it, i) => ({ sno: i+1, desc: it.desc, hsn: it.hsn, qty: it.qty, rate: it.rate, amount: (it.qty * it.rate).toFixed(2) })); }

  function updateStateCode() {
    const stateName = document.getElementById('stateName').value.trim().toLowerCase();
    const codeField = document.getElementById('stateCode');
    if (stateName.includes('delhi')) codeField.value = '07';
    else codeField.value = '';
    triggerPreviewUpdate();
  }

  let previewTimeout;
  function triggerPreviewUpdate() {
    if (previewTimeout) clearTimeout(previewTimeout);
    previewTimeout = setTimeout(() => {
      const previewDiv = document.getElementById('invoicePreview');
      if (previewDiv.style.display === 'block') generatePreviewOnly();
    }, 300);
  }

  function generatePreviewOnly() {
    const invData = collectInvoiceData();
    if (invData) document.getElementById('invoicePreview').innerHTML = buildInvoiceHTML(invData);
  }

  function collectInvoiceData() {
    const customerName = document.getElementById('customerName').value.trim();
    if (!customerName) return null;
    const items = getItemsArrayFromState();
    if (items.length === 0) return null;
    const taxable = items.reduce((s,i)=> s+parseFloat(i.amount),0);
    let stateCodeVal = document.getElementById('stateCode').value.trim();
    const isDelhi = (stateCodeVal === "07");
    let cgst=0, sgst=0, igst=0;
    if(isDelhi){ cgst = taxable*0.09; sgst = taxable*0.09; } 
    else { igst = taxable*0.18; }
    const cartage = parseFloat(document.getElementById('cartage').value) || 0;
    const grandTotal = taxable + cgst + sgst + igst + cartage;
    let invoiceNo = document.getElementById('invoiceNoManual').value.trim();
    if (invoiceNo === "") {
      const year = new Date().getFullYear().toString().slice(-2);
      invoiceNo = `INV-${year}/001`;
    }
    const today = new Date().toLocaleDateString('en-IN');
    return {
      invoiceNo, invoiceDate: today, customerName: customerName.toUpperCase(),
      custGstin: document.getElementById('custGstin').value,
      stateCode: stateCodeVal, stateName: document.getElementById('stateName').value,
      vehicleNo: document.getElementById('vehicleNo').value, deliveryDate: document.getElementById('deliveryDate').value,
      placeSupply: document.getElementById('placeSupply').value, transportMode: document.getElementById('transportMode').value,
      chequeNo: document.getElementById('chequeNo').value, bankBranch: document.getElementById('bankBranch').value,
      cartage, taxable, cgst, sgst, igst, grandTotal, isDelhi, items
    };
  }

  function buildInvoiceHTML(inv) {
    const { items, taxable, cgst, sgst, igst, grandTotal, isDelhi, cartage, customerName, custGstin, invoiceNo, invoiceDate, vehicleNo, deliveryDate, placeSupply, transportMode, stateCode, chequeNo, bankBranch, stateName } = inv;
    const words = numberToWords(grandTotal);
    let itemsRows = '';
    items.forEach(it => {
      itemsRows += `<tr><td>${it.sno}</td><td>${it.desc}</td><td>${it.hsn}</td><td>${it.qty}</td><td>₹ ${parseFloat(it.rate).toFixed(2)}NonNullList<itemList><tr><td>₹ ${it.amount}NonNullList<itemList></tr>`;
    });
    let gstBreakdown = '';
    if (isDelhi) {
      gstBreakdown = `<tr><td style="text-align:left;">CGST @9%</td><td>₹ ${cgst.toFixed(2)}</td></tr>
                       <tr><td style="text-align:left;">SGST @9%</td><td>₹ ${sgst.toFixed(2)}</td></tr>`;
    } else {
      gstBreakdown = `<tr><td style="text-align:left;">IGST @18%</td><td>₹ ${igst.toFixed(2)}</td></tr>`;
    }
    return `
      <div style="font-family:'Segoe UI',Roboto,sans-serif;" id="invoiceContent">
        <div style="text-align:center;"><div class="tax-invoice-title">TAX INVOICE</div></div>
        <div class="brand-header">
          <div class="brand-name">AV TECHNOLOGY</div>
          <div class="brand-tag">PROJECTORS | VIDEO CAMERA | LED VIDEO WALLS | SPARE PARTS</div>
          <div class="company-details">20 PART 2 SAINIK VIHAR MOHAN GARDEN UTTAM NAGAR NEW DELHI -59<br>📞 +91 9711166056  ✉ avtechnologyy@gmail.com</div>
        </div>

        <div class="info-grid-pro">
          <div class="info-left">
            <div class="info-row"><span class="info-label">M/S (Customer):</span><span class="info-value customer-name-cap">${customerName}</span></div>
            <div class="info-row"><span class="info-label">GSTIN NO:</span><span class="info-value">${custGstin || '—'}</span></div>
            <div class="info-row"><span class="info-label">State:</span><span class="info-value">${stateName} (Code: ${stateCode || '—'})</span></div>
            <div class="info-row"><span class="info-label">Place of Supply:</span><span class="info-value">${placeSupply || '—'}</span></div>
            <div class="info-row"><span class="info-label">Vehicle No:</span><span class="info-value">${vehicleNo || '—'}</span></div>
            <div class="info-row"><span class="info-label">Delivery Date:</span><span class="info-value">${deliveryDate || '—'}</span></div>
          </div>
          <div class="info-right">

  // Reliable PDF generation
  async function downloadPDF() {
    const previewDiv = document.getElementById('invoicePreview');
    if (!previewDiv || previewDiv.style.display !== 'block') {
      alert("Please generate an invoice first.");
      return;
    }
    let element = document.getElementById('invoiceContent');
    if (!element) {
      const invData = collectInvoiceData();
      if (!invData) { alert("No invoice data. Please fill customer and items."); return; }
      previewDiv.innerHTML = buildInvoiceHTML(invData);
      element = document.getElementById('invoiceContent');
      if (!element) { alert("Error generating invoice content."); return; }
    }
    element.style.display = 'block';
    await new Promise(r => setTimeout(r, 200));
    const opt = {
      margin: [0.2, 0.2, 0.2, 0.2],
      filename: `Invoice_${document.getElementById('invoiceNoManual').value || 'AV'}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, letterRendering: true, useCORS: true, logging: false },
      jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };
    try {
      await html2pdf().set(opt).from(element).save();
    } catch(e) {
      alert("PDF generation failed: " + e.message);
    }
  }

  async function shareAsPDF() {
    const previewDiv = document.getElementById('invoicePreview');
    if (!previewDiv || previewDiv.style.display !== 'block') {
      alert("Generate invoice first");
      return;
    }
    let element = document.getElementById('invoiceContent');
    if (!element) {
      const invData = collectInvoiceData();
      if (!invData) { alert("No invoice data."); return; }
      previewDiv.innerHTML = buildInvoiceHTML(invData);
      element = document.getElementById('invoiceContent');
    }
    await new Promise(r => setTimeout(r, 200));
    const opt = {
      margin: [0.2, 0.2, 0.2, 0.2],
      filename: `Invoice_${Date.now()}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    };
    try {
      const pdfBlob = await html2pdf().set(opt).from(element).outputPdf('blob');
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([pdfBlob], 'invoice.pdf', {type: 'application/pdf'})] })) {
        const file = new File([pdfBlob], 'invoice.pdf', { type: 'application/pdf' });
        await navigator.share({ files: [file], title: 'AV TECHNOLOGY Invoice' });
      } else {
        alert("Share not supported, you can download PDF and share manually.");
      }
    } catch(e) { alert("Share failed: " + e.message); }
  }

  async function saveAndGenerate() {
    const invoiceData = collectInvoiceData();
    if (!invoiceData) { alert("❌ Please fill Customer Name and at least one product."); return; }
    const finalHtml = buildInvoiceHTML(invoiceData);
    const previewDiv = document.getElementById('invoicePreview');
    previewDiv.innerHTML = finalHtml;
    previewDiv.style.display = 'block';
    if (!document.getElementById('previewActionButtons')) {
      const btnDiv = document.createElement('div');
      btnDiv.id = 'previewActionButtons';
      btnDiv.style.marginTop = '20px';
      btnDiv.style.display = 'flex';
      btnDiv.style.gap = '12px';
      btnDiv.innerHTML = `<button class="btn-pdf action-btn" id="pdfDownloadBtn">📄 Download PDF</button>
                          <button class="btn-share action-btn" id="pdfShareBtn">📤 Share PDF</button>`;
      previewDiv.appendChild(btnDiv);
      document.getElementById('pdfDownloadBtn').addEventListener('click', downloadPDF);
      document.getElementById('pdfShareBtn').addEventListener('click', shareAsPDF);
    }
    // Save to Google Sheet
    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(invoiceData)
      });
      alert(`✅ Invoice ${invoiceData.invoiceNo} saved to Google Sheet!`);
    } catch(e) {
      alert("Cloud save failed: " + e.message + "\nInvoice is still generated locally.");
    }
  }

  function setDefaultInvoiceNo() {
    const year = new Date().getFullYear().toString().slice(-2);
    const existing = document.getElementById('invoiceNoManual').value.trim();
    if (!existing) document.getElementById('invoiceNoManual').value = `INV-${year}/001`;
  }

  // Event listeners
  document.getElementById('addRowBtn').addEventListener('click', addNewItem);
  document.getElementById('generateInvoiceBtn').addEventListener('click', saveAndGenerate);
  document.getElementById('resetFormBtn').addEventListener('click', () => location.reload());
  document.getElementById('stateName').addEventListener('input', updateStateCode);
  document.getElementById('fetchInvoiceBtn').addEventListener('click', async () => {
    const invNo = document.getElementById('searchInvNo').value.trim();
    if(!invNo) return alert("Enter Invoice Number");
    try {
      const res = await fetch(`${SCRIPT_URL}?invoiceNo=${encodeURIComponent(invNo)}`);
      const text = await res.text();
      if (text === "NOT_FOUND") {
        document.getElementById('pastInvoiceContainer').innerHTML = "<p style='color:red;'>❌ Invoice not found in Google Sheet.</p>";
        return;
      }
      const data = JSON.parse(text);
      document.getElementById('pastInvoiceContainer').innerHTML = buildInvoiceHTML(data);
    } catch(e) {
      alert("Error fetching: " + e.message);
    }
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-pane'));
      if(btn.dataset.tab === 'create') document.getElementById('createTab').classList.add('active-pane');
      else document.getElementById('viewTab').classList.add('active-pane');
    });
  });

  renderItemsTable();
  updateStateCode();
  setDefaultInvoiceNo();
  document.getElementById('deliveryDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('placeSupply').value = "Delhi";
</script>
