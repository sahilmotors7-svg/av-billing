<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>AV TECHNOLOGY | Professional Invoice Suite</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #e2e8f0;
      font-family: 'Segoe UI', 'Roboto', 'Inter', system-ui, -apple-system, sans-serif;
      padding: 24px 16px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* MAIN APP CONTAINER - A4 FRIENDLY */
    .app-container {
      max-width: 210mm;
      width: 100%;
      margin: 0 auto;
      background: white;
      border-radius: 28px;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      transition: all 0.2s;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 8px;
      background: #f8fafc;
      padding: 16px 24px 0 24px;
      border-bottom: 2px solid #e2edff;
    }
    .tab-btn {
      background: none;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 40px 40px 0 0;
      cursor: pointer;
      transition: 0.2s;
      color: #1e293b;
      font-family: inherit;
    }
    .tab-btn.active {
      background: white;
      color: #1e4a76;
      border-bottom: 3px solid #1e4a76;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.02);
    }
    .tab-pane {
      display: none;
      padding: 28px 24px;
    }
    .tab-pane.active-pane {
      display: block;
    }

    /* FORM STYLES - MOBILE FRIENDLY GRID */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-weight: 700;
      font-size: 0.8rem;
      color: #0f3b5c;
      letter-spacing: 0.3px;
    }
    .field input, .field select {
      padding: 12px 14px;
      border: 1.5px solid #cbd5e1;
      border-radius: 18px;
      font-size: 0.9rem;
      transition: 0.2s;
      background: white;
      font-family: inherit;
    }
    .field input:focus, .field select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
    }

    /* ITEMS TABLE - HORIZONTAL SCROLL FOR MOBILE */
    .items-wrapper {
      overflow-x: auto;
      margin: 20px 0 15px;
      border-radius: 20px;
      border: 1px solid #e2edf2;
    }
    .items-table {
      width: 100%;
      min-width: 580px;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    .items-table th, .items-table td {
      border: 1px solid #d4dcec;
      padding: 10px 8px;
      text-align: center;
      vertical-align: middle;
    }
    .items-table th {
      background: #f1f6fe;
      font-weight: 800;
      color: #0c4e6e;
    }
    .items-table input {
      width: 100%;
      min-width: 85px;
      padding: 8px 5px;
      border: 1px solid #bfd6f0;
      border-radius: 14px;
      text-align: center;
      font-size: 0.8rem;
    }
    .add-row-btn {
      background: #0f3b2c;
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 6px;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .remove-row {
      background: #b91c1c;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 6px 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.7rem;
    }

    /* BUTTONS */
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin: 28px 0 20px;
    }
    .btn-primary {
      background: #1e4a76;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: 0.2s;
    }
    .btn-secondary {
      background: #475569;
    }
    .btn-wa {
      background: #075e54;
    }

    /* INVOICE PREVIEW (A4 PRINT STYLES) */
    .invoice-preview {
      background: white;
      margin-top: 35px;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      padding: 20px 24px;
      transition: 0.2s;
    }
    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
      }
      .app-container {
        max-width: 100%;
        box-shadow: none;
        border-radius: 0;
      }
      .tabs, .action-buttons, .add-row-btn, .remove-row, .tab-btn, #fetchInvoiceBtn, .btn-primary, .btn-secondary, .btn-wa, .form-grid, .items-wrapper, .add-row-btn, #loadInvoiceSection {
        display: none !important;
      }
      .invoice-preview {
        box-shadow: none;
        padding: 0.2in;
        margin: 0;
      }
      .stamp-sign-area {
        break-inside: avoid;
      }
    }

    /* BRANDING + STAMP + SIGNATURE */
    .brand-header {
      text-align: center;
      margin-bottom: 18px;
      border-bottom: 2px solid #eef2ff;
      padding-bottom: 12px;
    }
    .brand-name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: #003153;
      font-family: 'Inter', sans-serif;
    }
    .brand-tag {
      font-size: 0.75rem;
      color: #2c5a7a;
      font-weight: 500;
    }
    .company-details {
      font-size: 0.7rem;
      color: #2d3e50;
      text-align: center;
      margin-top: 6px;
    }
    .invoice-meta {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      margin: 16px 0;
      background: #f9fafb;
      padding: 12px 14px;
      border-radius: 20px;
    }
    .stamp-sign-area {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-top: 35px;
      gap: 30px;
    }
    /* Blue Rounded Seal (stamp) */
    .rounded-stamp {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 4px double #1e40af;
      background: rgba(30, 64, 175, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 800;
      color: #1e3a8a;
      font-size: 0.8rem;
      text-transform: uppercase;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      font-family: monospace;
      backdrop-filter: blur(1px);
    }
    .rounded-stamp span:first-child {
      font-size: 1rem;
      letter-spacing: 1px;
    }
    .rounded-stamp span:last-child {
      font-size: 0.65rem;
      border-top: 1px solid #2563eb;
      margin-top: 5px;
      padding-top: 3px;
    }
    .signature-block {
      text-align: right;
      border-top: 2px dashed #4b5563;
      min-width: 180px;
      padding-top: 8px;
      font-weight: 600;
    }
    .word-amount {
      background: #eef2ff;
      padding: 8px 14px;
      border-radius: 28px;
      margin: 15px 0;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .total-row {
      background: #fef9e3;
      font-weight: 800;
    }
    .gst-break {
      font-size: 0.8rem;
    }

    /* responsive fixes */
    @media (max-width: 640px) {
      .tab-pane {
        padding: 18px 14px;
      }
      .invoice-preview {
        padding: 14px;
      }
      .rounded-stamp {
        width: 85px;
        height: 85px;
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="tabs">
    <button class="tab-btn active" data-tab="create">📝 Create Invoice</button>
    <button class="tab-btn" data-tab="view">🔍 Retrieve Invoice</button>
  </div>

  <!-- CREATE INVOICE PANEL -->
  <div id="createTab" class="tab-pane active-pane">
    <div class="form-grid">
      <div class="field"><label>Invoice No. (Manual / Auto)</label><input type="text" id="invoiceNoManual" placeholder="INV-2025-001" value=""></div>
      <div class="field"><label>Customer Name (M/S) *</label><input type="text" id="customerName" placeholder="M/s Sharma Enterprises"></div>
      <div class="field"><label>Customer GSTIN</label><input type="text" id="custGstin" placeholder="07ABCFG1234F1Z"></div>
      <div class="field"><label>State Name (auto code)</label><input type="text" id="stateName" placeholder="Delhi" value="Delhi"></div>
      <div class="field"><label>State Code</label><input type="text" id="stateCode" placeholder="07" readonly style="background:#f1f5f9;"></div>
      <div class="field"><label>Vehicle No.</label><input type="text" id="vehicleNo" placeholder="DL 01 AB 5678"></div>
      <div class="field"><label>Date of Delivery</label><input type="date" id="deliveryDate"></div>
      <div class="field"><label>Place of Supply</label><input type="text" id="placeSupply" placeholder="New Delhi"></div>
      <div class="field"><label>Transport Mode</label><input type="text" id="transportMode" placeholder="Road / Van"></div>
      <div class="field"><label>Cheque No.</label><input type="text" id="chequeNo"></div>
      <div class="field"><label>Bank & Branch</label><input type="text" id="bankBranch" placeholder="SBI, Main Branch"></div>
      <div class="field"><label>Cartage (₹) Labour & others</label><input type="number" id="cartage" value="0" step="1"></div>
    </div>

    <label style="font-weight:800; margin-bottom:6px; display:block;">📦 Invoice Items</label>
    <div class="items-wrapper">
      <table class="items-table" id="itemsTable">
        <thead><tr><th>S.No</th><th>PARTICULARS</th><th>HSN CODE</th><th>QTY</th><th>RATE (₹)</th><th>AMOUNT (₹)</th><th></th></tr></thead>
        <tbody id="itemsBody"></tbody>
      </table>
    </div>
    <button type="button" class="add-row-btn" id="addRowBtn">+ Add Product / Service</button>

    <div class="action-buttons">
      <button class="btn-primary" id="generateInvoiceBtn">💾 Generate & Save Invoice</button>
      <button class="btn-primary btn-secondary" id="resetFormBtn">⟳ Reset Fields</button>
    </div>

    <!-- PREVIEW AREA (A4 Professional Invoice) -->
    <div id="invoicePreview" class="invoice-preview" style="display: none;"></div>
  </div>

  <!-- VIEW INVOICE TAB -->
  <div id="viewTab" class="tab-pane">
    <div class="form-grid">
      <div class="field"><label>Enter Invoice Number</label><input type="text" id="searchInvNo" placeholder="e.g., INV-1744287600000"></div>
    </div>
    <button class="btn-primary" id="fetchInvoiceBtn">🔎 Load Invoice</button>
    <div id="pastInvoiceContainer" style="margin-top: 30px;"></div>
  </div>
</div>

<script>
  // ------------------------- CONFIGURATION -------------------------
  // 🔁 REPLACE WITH YOUR GOOGLE APPS SCRIPT WEB APP URL (see instructions)
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_REPLACE_ME/exec"; 
  const USE_MOCK = false;   // set to false after deploying Apps Script

  // Helper: Number to Indian Rupees words (accurate)
  function numberToWords(num) {
    if (num === 0) return "Zero Rupees Only";
    const ones = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
    const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
    function convertLessThanThousand(n) {
      if (n === 0) return "";
      if (n < 20) return ones[n] + " ";
      if (n < 100) return tens[Math.floor(n/10)] + " " + (n%10 !== 0 ? ones[n%10] + " " : "");
      return ones[Math.floor(n/100)] + " Hundred " + (n%100 !== 0 ? convertLessThanThousand(n%100) : "");
    }
    let rupees = Math.floor(num);
    let paise = Math.round((num - rupees) * 100);
    let result = "";
    if (rupees >= 10000000) result += convertLessThanThousand(Math.floor(rupees/10000000)) + "Crore ";
    rupees %= 10000000;
    if (rupees >= 100000) result += convertLessThanThousand(Math.floor(rupees/100000)) + "Lakh ";
    rupees %= 100000;
    if (rupees >= 1000) result += convertLessThanThousand(Math.floor(rupees/1000)) + "Thousand ";
    rupees %= 1000;
    if (rupees >= 100) result += convertLessThanThousand(Math.floor(rupees/100)) + "Hundred ";
    rupees %= 100;
    if (rupees > 0) result += convertLessThanThousand(rupees);
    result = result.trim() + " Rupees";
    if (paise > 0) result += " and " + convertLessThanThousand(paise).trim() + " Paise";
    return result + " Only";
  }

  // Items management
  let itemsRowCount = 1;
  function renderItemRows() {
    const tbody = document.getElementById('itemsBody');
    tbody.innerHTML = '';
    for (let i = 0; i < itemsRowCount; i++) {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = i+1;
      row.insertCell(1).innerHTML = `<input type="text" id="item_${i}_desc" placeholder="Product / Service" style="min-width:110px;">`;
      row.insertCell(2).innerHTML = `<input type="text" id="item_${i}_hsn" placeholder="HSN">`;
      row.insertCell(3).innerHTML = `<input type="number" id="item_${i}_qty" value="1" step="1" min="0">`;
      row.insertCell(4).innerHTML = `<input type="number" id="item_${i}_rate" value="0" step="1" min="0">`;
      row.insertCell(5).innerHTML = `<span id="item_${i}_amount">0</span>`;
      const delCell = row.insertCell(6);
      if (itemsRowCount > 1) {
        const delBtn = document.createElement('button');
        delBtn.innerText = '✖';
        delBtn.className = 'remove-row';
        delBtn.onclick = (function(idx) { return function() { removeRow(idx); }; })(i);
        delCell.appendChild(delBtn);
      }
    }
    attachItemEvents();
  }

  function removeRow(idx) {
    if (itemsRowCount <= 1) return;
    itemsRowCount--;
    renderItemRows();
    triggerPreviewUpdate();
  }

  function attachItemEvents() {
    for (let i=0; i<itemsRowCount; i++) {
      const qtyEl = document.getElementById(`item_${i}_qty`);
      const rateEl = document.getElementById(`item_${i}_rate`);
      if (qtyEl) qtyEl.addEventListener('input', () => updateItemAmount(i));
      if (rateEl) rateEl.addEventListener('input', () => updateItemAmount(i));
    }
  }

  function updateItemAmount(idx) {
    const qty = parseFloat(document.getElementById(`item_${idx}_qty`)?.value) || 0;
    const rate = parseFloat(document.getElementById(`item_${idx}_rate`)?.value) || 0;
    const amt = qty * rate;
    const span = document.getElementById(`item_${idx}_amount`);
    if (span) span.innerText = amt.toFixed(2);
    triggerPreviewUpdate();
  }

  function getItemsArray() {
    let items = [];
    for (let i=0; i<itemsRowCount; i++) {
      let desc = document.getElementById(`item_${i}_desc`)?.value || '';
      let hsn = document.getElementById(`item_${i}_hsn`)?.value || '';
      let qty = parseFloat(document.getElementById(`item_${i}_qty`)?.value) || 0;
      let rate = parseFloat(document.getElementById(`item_${i}_rate`)?.value) || 0;
      let amount = qty * rate;
      items.push({ sno: i+1, desc, hsn, qty, rate, amount: amount.toFixed(2) });
    }
    return items;
  }

  // Auto state code based on state name
  function updateStateCode() {
    const stateName = document.getElementById('stateName').value.trim().toLowerCase();
    const stateCodeField = document.getElementById('stateCode');
    if (stateName.includes('delhi')) {
      stateCodeField.value = '07';
    } else {
      stateCodeField.value = ''; 
    }
    triggerPreviewUpdate();
  }

  let previewTimeout;
  function triggerPreviewUpdate() {
    if (previewTimeout) clearTimeout(previewTimeout);
    previewTimeout = setTimeout(() => {
      const previewDiv = document.getElementById('invoicePreview');
      if (previewDiv.style.display === 'block') {
        generateInvoicePreviewOnly();
      }
    }, 300);
  }

  function generateInvoicePreviewOnly() {
    const invoiceData = collectInvoiceData();
    if (!invoiceData) return;
    const html = buildInvoiceHTML(invoiceData);
    const previewDiv = document.getElementById('invoicePreview');
    previewDiv.innerHTML = html;
    previewDiv.style.display = 'block';
  }

  function collectInvoiceData() {
    const customerName = document.getElementById('customerName').value.trim();
    if (!customerName) return null;
    const items = getItemsArray().filter(it => it.desc.trim() !== "");
    if (items.length === 0) return null;
    const taxable = items.reduce((s,i)=> s+parseFloat(i.amount),0);
    let stateCodeRaw = document.getElementById('stateCode').value.trim();
    const isDelhi = (stateCodeRaw === "07");
    let cgst=0, sgst=0, igst=0;
    if(isDelhi){ cgst = taxable*0.09; sgst = taxable*0.09; } 
    else { igst = taxable*0.18; }
    const cartage = parseFloat(document.getElementById('cartage').value) || 0;
    const grandTotal = taxable + cgst + sgst + igst + cartage;
    let invoiceNo = document.getElementById('invoiceNoManual').value.trim();
    if (invoiceNo === "") invoiceNo = "INV-" + Date.now();
    const today = new Date().toLocaleDateString('en-IN');
    return {
      invoiceNo, invoiceDate: today, customerName, custGstin: document.getElementById('custGstin').value,
      stateCode: stateCodeRaw, stateName: document.getElementById('stateName').value,
      vehicleNo: document.getElementById('vehicleNo').value, deliveryDate: document.getElementById('deliveryDate').value,
      placeSupply: document.getElementById('placeSupply').value, transportMode: document.getElementById('transportMode').value,
      chequeNo: document.getElementById('chequeNo').value, bankBranch: document.getElementById('bankBranch').value,
      cartage, taxable, cgst, sgst, igst, grandTotal, isDelhi, items
    };
  }

  function buildInvoiceHTML(inv) {
    const { items, taxable, cgst, sgst, igst, grandTotal, isDelhi, cartage, customerName, custGstin, invoiceNo, invoiceDate, vehicleNo, deliveryDate, placeSupply, transportMode, stateCode, chequeNo, bankBranch, stateName } = inv;
    const words = numberToWords(grandTotal);
    let itemsRows = '';
    items.forEach(it => {
      itemsRows += `<tr><td>${it.sno}</td><td>${it.desc}</td><td>${it.hsn}</td><td>${it.qty}</td><td>₹ ${parseFloat(it.rate).toFixed(2)}</td><td>₹ ${it.amount}</td></tr>`;
    });
    let gstBreakdown = '';
    if (isDelhi) {
      gstBreakdown = `<tr><td class="gst-break">CGST @9%</td><td>₹ ${cgst.toFixed(2)}</td></tr>
                      <tr><td class="gst-break">SGST @9%</td><td>₹ ${sgst.toFixed(2)}</td></tr>`;
    } else {
      gstBreakdown = `<tr><td class="gst-break">IGST @18%</td><td>₹ ${igst.toFixed(2)}</td></tr>`;
    }
    return `
      <div style="font-family:'Segoe UI',Roboto,sans-serif; max-width:100%;">
        <div class="brand-header">
          <div class="brand-name">✦ AV TECHNOLOGY ✦</div>
          <div class="brand-tag">PROJECTORS | VIDEO CAMERA | LED VIDEO WALLS | SPARE PARTS</div>
          <div class="company-details">20 PART 2 SAINIK VIHAR MOHAN GARDEN UTTAM NAGAR NEW DELHI -59<br>📞 +91 9711166056  ✉ avtechnologyy@gmail.com</div>
        </div>
        <div class="invoice-meta">
          <span><strong>GSTIN:</strong> 07ABIFA3151F1ZS</span>
          <span><strong>STATE CODE:</strong> 07</span>
          <span><strong>INVOICE NO:</strong> ${invoiceNo}</span>
          <span><strong>DATE:</strong> ${invoiceDate}</span>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; background:#fafcff; padding:12px; border-radius:20px; margin-bottom:14px;">
          <div><strong>M/S:</strong> ${customerName}<br><strong>GSTIN NO:</strong> ${custGstin || '—'}<br><strong>State:</strong> ${stateName} (Code:${stateCode})</div>
          <div><strong>VEHICLE NO:</strong> ${vehicleNo || '—'}<br><strong>DELIVERY DATE:</strong> ${deliveryDate || '—'}<br><strong>PLACE OF SUPPLY:</strong> ${placeSupply || '—'}<br><strong>TRANSPORT MODE:</strong> ${transportMode || '—'}</div>
        </div>
        <div class="items-wrapper" style="border:none; margin:0 0 12px 0;"><table class="items-table" style="min-width:500px;"><thead><tr><th>S.No</th><th>PARTICULAR</th><th>HSN</th><th>QTY</th><th>RATE</th><th>AMOUNT</th></tr></thead><tbody>${itemsRows}</tbody></table></div>
        <div style="text-align:right; font-weight:600;">TAXABLE VALUE: ₹ ${taxable.toFixed(2)}</div>
        <div class="word-amount"><strong>AMOUNT IN WORDS:</strong> ${words}</div>
        <table style="width:100%; margin:10px 0; border-collapse:collapse;">${gstBreakdown}<tr><td><strong>CARTAGE (Labour & others)</strong></td><td>₹ ${cartage.toFixed(2)}</td></tr><tr class="total-row"><td><strong>TOTAL SALE VALUE WITH GST</strong></td><td><strong>₹ ${grandTotal.toFixed(2)}</strong></td></tr></table>
        <div style="font-size:0.7rem; margin:12px 0; background:#fef7e0; padding:8px; border-radius:16px;"><strong>TERMS & CONDITIONS:</strong><br>1. IF THE BILL IS NOT PAID ON DUE DATE INTEREST 18% P.A WILL BE CHARGED.<br>2. ALL DISPUTES SUBJECT TO DELHI JURISDICTION ONLY.<br>3. GOODS ONCE SOLD WILL NOT BE TAKEN BACK.<br>CERTIFIED THAT THE PARTICULARS GIVEN ABOVE ARE TRUE & CORRECT</div>
        <div class="stamp-sign-area">
          <div class="rounded-stamp">
            <span>🔹 AV TECHNOLOGY 🔹</span>
            <span>DELHI • APPROVED</span>
          </div>
          <div class="signature-block">
            FOR AV TECHNOLOGY<br>
            <span style="border-top:2px solid #1f2937; display:inline-block; width:160px; margin-top:6px;"></span><br>
            AUTHORISED SIGNATORY
          </div>
        </div>
        <div style="text-align:center; font-size:9px; margin-top:15px;">E. & O. E.</div>
      </div>`;
  }

  async function saveAndGenerate() {
    const invoiceData = collectInvoiceData();
    if (!invoiceData) { alert("❌ Please fill Customer Name and at least one product item."); return; }
    const finalHtml = buildInvoiceHTML(invoiceData);
    const previewDiv = document.getElementById('invoicePreview');
    previewDiv.innerHTML = finalHtml;
    previewDiv.style.display = 'block';
    // Cloud storage
    if (!USE_MOCK && SCRIPT_URL.includes("REPLACE_ME")) {
      alert("⚠️ Google Apps Script URL not configured. Invoice preview ready but NOT saved to cloud. (replace SCRIPT_URL)");
    } else if (!USE_MOCK) {
      try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(invoiceData) });
        alert(`✅ Invoice ${invoiceData.invoiceNo} saved to Google Sheet!`);
      } catch(e) { alert("Cloud save failed, but invoice is ready. "+e.message); }
    } else {
      localStorage.setItem(invoiceData.invoiceNo, JSON.stringify(invoiceData));
      alert(`📌 Demo save: ${invoiceData.invoiceNo} stored locally.`);
    }
    window.open(`https://wa.me/?text=🧾 *AV TECHNOLOGY INVOICE*%0ANo: ${invoiceData.invoiceNo}%0ATotal: ₹${invoiceData.grandTotal.toFixed(2)}%0ACustomer: ${invoiceData.customerName}`, '_blank');
  }

  // Event listeners
  document.getElementById('addRowBtn').addEventListener('click', () => { itemsRowCount++; renderItemRows(); triggerPreviewUpdate(); });
  document.getElementById('generateInvoiceBtn').addEventListener('click', saveAndGenerate);
  document.getElementById('resetFormBtn').addEventListener('click', () => { location.reload(); });
  document.getElementById('stateName').addEventListener('input', updateStateCode);
  document.getElementById('fetchInvoiceBtn').addEventListener('click', async () => {
    const invNo = document.getElementById('searchInvNo').value.trim();
    if(!invNo) return alert("Enter Invoice Number");
    if(!USE_MOCK && !SCRIPT_URL.includes("REPLACE_ME")) {
      alert("For full fetch, implement doGet in Apps Script. Use mock mode for demo.");
    } else if(USE_MOCK){
      const data = localStorage.getItem(invNo);
      if(data) document.getElementById('pastInvoiceContainer').innerHTML = buildInvoiceHTML(JSON.parse(data));
      else document.getElementById('pastInvoiceContainer').innerHTML = "<p style='color:red;'>❌ Invoice not found locally</p>";
    } else {
      alert("Configure GET endpoint or enable mock.");
    }
  });

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-pane'));
      if(btn.dataset.tab === 'create') document.getElementById('createTab').classList.add('active-pane');
      else document.getElementById('viewTab').classList.add('active-pane');
    });
  });
  renderItemRows();
  updateStateCode();
  // Set default delivery date = today
  const todayDate = new Date().toISOString().split('T')[0];
  document.getElementById('deliveryDate').value = todayDate;
  document.getElementById('placeSupply').value = "Delhi";
</script>
