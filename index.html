<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AV TECHNOLOGY | Professional Tax Invoice</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #eef2f8;
      font-family: 'Segoe UI', 'Roboto', 'Inter', system-ui, sans-serif;
      padding: 20px 16px;
      display: flex;
      justify-content: center;
    }
    .app-container {
      max-width: 210mm;
      width: 100%;
      background: white;
      border-radius: 28px;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.15);
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }
    .tabs {
      display: flex;
      gap: 8px;
      background: #f9fbfd;
      padding: 14px 24px 0 24px;
      border-bottom: 2px solid #e2edf5;
    }
    .tab-btn {
      background: none;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 30px 30px 0 0;
      cursor: pointer;
      color: #2c3e66;
    }
    .tab-btn.active {
      background: white;
      color: #0f3b5c;
      border-bottom: 3px solid #0f3b5c;
    }
    .tab-pane {
      display: none;
      padding: 28px 24px;
    }
    .tab-pane.active-pane { display: block; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-weight: 700;
      font-size: 0.75rem;
      color: #1e4a76;
    }
    .field input, .field select {
      padding: 12px 14px;
      border: 1.5px solid #cbdbe6;
      border-radius: 18px;
      font-size: 0.9rem;
    }
    .items-wrapper {
      overflow-x: auto;
      margin: 18px 0 12px;
      border-radius: 20px;
      border: 1px solid #e2edf2;
    }
    .items-table {
      width: 100%;
      min-width: 580px;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    .items-table th, .items-table td {
      border: 1px solid #cfdfed;
      padding: 10px 6px;
      text-align: center;
    }
    .items-table th {
      background: #f0f6fe;
      font-weight: 800;
      color: #0f3b5c;
    }
    .items-table input {
      width: 100%;
      padding: 7px 4px;
      border: 1px solid #cbdbe6;
      border-radius: 14px;
      text-align: center;
    }
    .add-row-btn {
      background: #0f3b2c;
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 6px;
    }
    .remove-row {
      background: #b91c1c;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 5px 12px;
      cursor: pointer;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin: 28px 0 20px;
    }
    .btn-primary {
      background: #1e4a76;
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }
    .btn-secondary { background: #4a5568; }
    .btn-print { background: #2c6e2c; }
    .invoice-preview {
      background: white;
      margin-top: 30px;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 20px 24px;
      border: 1px solid #e9eef3;
    }
    /* PRINT STYLES - A4 single page, no extra headers */
    @media print {
      body { background: white; padding: 0; margin: 0; }
      .app-container { max-width: 100%; box-shadow: none; border-radius: 0; border: none; }
      .tabs, .action-buttons, .add-row-btn, .remove-row, .tab-btn, .form-grid, .items-wrapper, .btn-primary, .btn-print, #previewActionButtons, .invoice-list, .no-print, .print-button-container {
        display: none !important;
      }
      .invoice-preview { margin: 0; padding: 0.15in; box-shadow: none; border: none; }
      @page { size: A4; margin: 0.15in; }
      body * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      /* Prevent page breaks inside critical sections */
      .brand-header, .info-grid-pro, .items-table-preview, .word-amount, .terms, .stamp-sign-wrapper {
        break-inside: avoid;
        page-break-inside: avoid;
      }
    }
    /* Premium invoice styles */
    .tax-invoice-title {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2px;
      color: #1f3b4c;
      margin-bottom: 12px;
      border-bottom: 1.5px solid #cfdfed;
      display: inline-block;
      padding-bottom: 6px;
    }
    .brand-header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 1px solid #e9eef3;
      padding-bottom: 10px;
    }
    .brand-name {
      font-size: 1.9rem;
      font-weight: 800;
      color: #003153;
    }
    .brand-tag {
      font-size: 0.7rem;
      color: #2c5a7a;
    }
    .company-details {
      font-size: 0.7rem;
      color: #2d3e50;
      margin-top: 6px;
    }
    .info-grid-pro {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      background: #fafcff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 18px 24px;
      margin: 20px 0;
      gap: 24px;
    }
    .info-left { flex: 2; min-width: 220px; }
    .info-right { flex: 1.5; min-width: 200px; border-left: 1px solid #e2e8f0; padding-left: 24px; }
    .info-row {
      display: flex;
      margin-bottom: 12px;
      font-size: 0.82rem;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .info-label {
      font-weight: 800;
      width: 110px;
      color: #1f4a6e;
    }
    .info-value {
      font-weight: 500;
      color: #1e293b;
    }
    .customer-name-cap {
      text-transform: uppercase;
      font-weight: 800;
      font-size: 1rem;
      color: #0f3b5c;
    }
    .items-table-preview {
      width: 100%;
      border-collapse: collapse;
      margin: 18px 0;
      font-size: 0.75rem;
      border: 1px solid #cfdfed;
    }
    .items-table-preview th, .items-table-preview td {
      border: 1px solid #cfdfed;
      padding: 8px 6px;
      text-align: center;
    }
    .items-table-preview th {
      background: #1e4a76;
      color: white;
    }
    .word-amount {
      background: #eef2ff;
      padding: 8px 14px;
      border-radius: 28px;
      margin: 12px 0;
      font-weight: 600;
      border: 1px solid #d9e2ef;
    }
    .total-row { background: #fef9e3; font-weight: 800; }
    .stamp-sign-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 35px;
      gap: 30px;
      border-top: 1px solid #e2e8f0;
      padding-top: 20px;
    }
    /* Stamp container - centred */
    .stamp-container {
      text-align: center;
    }
    .stamp-svg {
      width: 95px;
      height: 95px;
      filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
      opacity: 0.92;
      display: inline-block;
    }
    .signature-box {
      text-align: right;
      border-top: 2px dashed #4b5563;
      min-width: 170px;
      padding-top: 8px;
      font-weight: 600;
    }
    .terms {
      font-size: 0.68rem;
      background: #fef7e0;
      padding: 10px;
      border-radius: 16px;
      margin: 12px 0;
      border-left: 3px solid #f59e0b;
      border: 1px solid #fde68a;
    }
    .invoice-list {
      margin-top: 20px;
      border-top: 2px solid #e2edf5;
      padding-top: 20px;
    }
    .invoice-card {
      background: #f9fafb;
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid #e2e8f0;
    }
    .invoice-card-header {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 10px;
    }
    .invoice-actions button {
      margin-left: 8px;
      padding: 6px 12px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      font-size: 0.7rem;
    }
    .search-box {
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .search-box input {
      flex: 1;
      padding: 10px;
      border-radius: 40px;
      border: 1px solid #cbdbe6;
    }
    .print-button-container {
      margin-top: 20px;
      text-align: center;
    }
    @media (max-width: 700px) {
      .info-left, .info-right { flex: 1; border-left: none; padding-left: 0; }
      .info-grid-pro { flex-direction: column; }
      .stamp-svg { width: 75px; height: 75px; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="tabs">
    <button class="tab-btn active" data-tab="create">📄 Create Invoice</button>
    <button class="tab-btn" data-tab="view">🔍 Retrieve Invoice</button>
  </div>

  <!-- CREATE TAB -->
  <div id="createTab" class="tab-pane active-pane">
    <div class="form-grid">
      <div class="field"><label>Invoice No. (Year/Seq)</label><input type="text" id="invoiceNoManual" placeholder="INV-26/001"></div>
      <div class="field"><label>Customer Name (M/S) *</label><input type="text" id="customerName" placeholder="M/s SHARMA ENTERPRISES"></div>
      <div class="field"><label>Customer GSTIN</label><input type="text" id="custGstin" placeholder="07ABCFG1234F1Z"></div>
      <div class="field"><label>State Name (auto code)</label><input type="text" id="stateName" placeholder="Delhi" value="Delhi"></div>
      <div class="field"><label>State Code</label><input type="text" id="stateCode" placeholder="07" readonly style="background:#f1f5f9;"></div>
      <div class="field"><label>Vehicle No.</label><input type="text" id="vehicleNo" placeholder="DL 01 AB 5678"></div>
      <div class="field"><label>Date of Delivery</label><input type="date" id="deliveryDate"></div>
      <div class="field"><label>Place of Supply</label><input type="text" id="placeSupply" placeholder="New Delhi"></div>
      <div class="field"><label>Transport Mode</label><input type="text" id="transportMode" placeholder="Road / Van"></div>
      <div class="field"><label>Cheque No.</label><input type="text" id="chequeNo"></div>
      <div class="field"><label>Bank & Branch</label><input type="text" id="bankBranch" placeholder="SBI, Main Branch"></div>
      <div class="field"><label>Cartage (₹)</label><input type="number" id="cartage" value="0" step="1"></div>
    </div>
    <div style="font-weight:800; margin-bottom:6px;">📦 Invoice Items</div>
    <div class="items-wrapper">
      <table class="items-table" id="itemsTable">
        <thead><tr><th>S.No</th><th>PARTICULARS</th><th>HSN CODE</th><th>QTY</th><th>RATE (₹)</th><th>AMOUNT (₹)</th><th></th></tr></thead>
        <tbody id="itemsBody"></tbody>
      </table>
    </div>
    <button type="button" class="add-row-btn" id="addRowBtn">+ Add Product / Service</button>
    <div class="action-buttons">
      <button class="btn-primary" id="generateInvoiceBtn">💾 Generate & Save Invoice</button>
      <button class="btn-primary btn-secondary" id="resetFormBtn">⟳ Reset Fields</button>
    </div>
    <div id="invoicePreview" class="invoice-preview" style="display: none;"></div>
  </div>

  <!-- VIEW TAB -->
  <div id="viewTab" class="tab-pane">
    <div class="search-box">
      <input type="text" id="searchCustomerName" placeholder="🔍 Search by customer name...">
      <button class="btn-primary" id="refreshInvoiceList">🔄 Refresh</button>
    </div>
    <div id="invoiceListContainer">Loading invoices...</div>
    <div id="pastInvoiceContainer" style="margin-top: 30px;"></div>
  </div>
</div>

<script>
  // ---------- CONFIGURATION ----------
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvvVq0C0FbyoyULkxk9LZZyMayWmNSc-mta2ksFrbnJ6e3qOyWOYoc6rFKCoCeKQQugA/exec";
  
  let itemsArray = [{ desc: "", hsn: "", qty: 1, rate: 0, amount: 0 }];
  let allInvoices = [];

  // Helper: random tilt for stamp
  function getRandomStampTransform() {
    const tilt = (Math.random() * 14) - 7;
    const shiftX = (Math.random() * 8) - 4;
    const shiftY = (Math.random() * 8) - 4;
    const scale = 0.97 + (Math.random() * 0.06);
    return `rotate(${tilt}deg) translate(${shiftX}px, ${shiftY}px) scale(${scale})`;
  }

  // Number to words (Indian Rupees)
  function numberToWords(num) {
    if (num === 0) return "Zero Rupees Only";
    const ones = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
    const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
    function convertLessThanThousand(n) {
      if (n === 0) return "";
      if (n < 20) return ones[n] + " ";
      if (n < 100) return tens[Math.floor(n/10)] + " " + (n%10 !== 0 ? ones[n%10] + " " : "");
      return ones[Math.floor(n/100)] + " Hundred " + (n%100 !== 0 ? convertLessThanThousand(n%100) : "");
    }
    let rupees = Math.floor(num);
    let paise = Math.round((num - rupees) * 100);
    let result = "";
    if (rupees >= 10000000) result += convertLessThanThousand(Math.floor(rupees/10000000)) + "Crore ";
    rupees %= 10000000;
    if (rupees >= 100000) result += convertLessThanThousand(Math.floor(rupees/100000)) + "Lakh ";
    rupees %= 100000;
    if (rupees >= 1000) result += convertLessThanThousand(Math.floor(rupees/1000)) + "Thousand ";
    rupees %= 1000;
    if (rupees >= 100) result += convertLessThanThousand(Math.floor(rupees/100)) + "Hundred ";
    rupees %= 100;
    if (rupees > 0) result += convertLessThanThousand(rupees);
    result = result.trim() + " Rupees";
    if (paise > 0) result += " and " + convertLessThanThousand(paise).trim() + " Paise";
    return result + " Only";
  }

  // Render items table
  function renderItemsTable() {
    const tbody = document.getElementById('itemsBody');
    tbody.innerHTML = '';
    itemsArray.forEach((item, idx) => {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = idx+1;
      row.insertCell(1).innerHTML = `<input type="text" class="item-desc" data-idx="${idx}" value="${escapeHtml(item.desc)}" placeholder="Product / Service">`;
      row.insertCell(2).innerHTML = `<input type="text" class="item-hsn" data-idx="${idx}" value="${escapeHtml(item.hsn)}" placeholder="HSN">`;
      row.insertCell(3).innerHTML = `<input type="number" class="item-qty" data-idx="${idx}" value="${item.qty}" step="1" min="0">`;
      row.insertCell(4).innerHTML = `<input type="number" class="item-rate" data-idx="${idx}" value="${item.rate}" step="1" min="0">`;
      row.insertCell(5).innerHTML = `<span class="item-amount" data-idx="${idx}">${item.amount.toFixed(2)}</span>`;
      const delCell = row.insertCell(6);
      if (itemsArray.length > 1) {
        const delBtn = document.createElement('button');
        delBtn.innerText = '✖';
        delBtn.className = 'remove-row';
        delBtn.onclick = () => removeItemRow(idx);
        delCell.appendChild(delBtn);
      }
    });
    attachItemEvents();
    updateAllAmounts();
  }
  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  function attachItemEvents() {
    document.querySelectorAll('.item-desc').forEach(inp => inp.addEventListener('input', function(e) { let idx = parseInt(this.dataset.idx); itemsArray[idx].desc = this.value; updateAmount(idx); triggerPreviewUpdate(); }));
    document.querySelectorAll('.item-hsn').forEach(inp => inp.addEventListener('input', function(e) { let idx = parseInt(this.dataset.idx); itemsArray[idx].hsn = this.value; triggerPreviewUpdate(); }));
    document.querySelectorAll('.item-qty').forEach(inp => inp.addEventListener('input', function(e) { let idx = parseInt(this.dataset.idx); itemsArray[idx].qty = parseFloat(this.value) || 0; updateAmount(idx); triggerPreviewUpdate(); }));
    document.querySelectorAll('.item-rate').forEach(inp => inp.addEventListener('input', function(e) { let idx = parseInt(this.dataset.idx); itemsArray[idx].rate = parseFloat(this.value) || 0; updateAmount(idx); triggerPreviewUpdate(); }));
  }
  function updateAmount(idx) {
    let qty = itemsArray[idx].qty || 0;
    let rate = itemsArray[idx].rate || 0;
    let amt = qty * rate;
    itemsArray[idx].amount = amt;
    const span = document.querySelector(`.item-amount[data-idx="${idx}"]`);
    if (span) span.innerText = amt.toFixed(2);
  }
  function updateAllAmounts() { itemsArray.forEach((_, i) => updateAmount(i)); }
  function removeItemRow(idx) { if (itemsArray.length <= 1) return; itemsArray.splice(idx, 1); renderItemsTable(); triggerPreviewUpdate(); }
  function addNewItem() { itemsArray.push({ desc: "", hsn: "", qty: 1, rate: 0, amount: 0 }); renderItemsTable(); triggerPreviewUpdate(); }
  function getItemsArrayFromState() { return itemsArray.filter(it => it.desc.trim() !== "").map((it, i) => ({ sno: i+1, desc: it.desc, hsn: it.hsn, qty: it.qty, rate: it.rate, amount: (it.qty * it.rate).toFixed(2) })); }
  function updateStateCode() {
    const stateName = document.getElementById('stateName').value.trim().toLowerCase();
    if (stateName.includes('delhi')) document.getElementById('stateCode').value = '07';
    else document.getElementById('stateCode').value = '';
    triggerPreviewUpdate();
  }
  let previewTimeout;
  function triggerPreviewUpdate() {
    if (previewTimeout) clearTimeout(previewTimeout);
    previewTimeout = setTimeout(() => {
      const previewDiv = document.getElementById('invoicePreview');
      if (previewDiv.style.display === 'block') generatePreviewOnly();
    }, 300);
  }
  function generatePreviewOnly() {
    const invData = collectInvoiceData();
    if (invData) document.getElementById('invoicePreview').innerHTML = buildInvoiceHTML(invData);
  }
  function collectInvoiceData() {
    const customerName = document.getElementById('customerName').value.trim();
    if (!customerName) return null;
    const items = getItemsArrayFromState();
    if (items.length === 0) return null;
    const taxable = items.reduce((s,i)=> s+parseFloat(i.amount),0);
    let stateCodeVal = document.getElementById('stateCode').value.trim();
    const isDelhi = (stateCodeVal === "07");
    let cgst=0, sgst=0, igst=0;
    if(isDelhi){ cgst = taxable*0.09; sgst = taxable*0.09; } else { igst = taxable*0.18; }
    const cartage = parseFloat(document.getElementById('cartage').value) || 0;
    const grandTotal = taxable + cgst + sgst + igst + cartage;
    let invoiceNo = document.getElementById('invoiceNoManual').value.trim();
    if (invoiceNo === "") {
      const year = new Date().getFullYear().toString().slice(-2);
      invoiceNo = `INV-${year}/001`;
    }
    const today = new Date().toLocaleDateString('en-IN');
    return {
      invoiceNo, invoiceDate: today, customerName: customerName.toUpperCase(),
      custGstin: document.getElementById('custGstin').value,
      stateCode: stateCodeVal, stateName: document.getElementById('stateName').value,
      vehicleNo: document.getElementById('vehicleNo').value, deliveryDate: document.getElementById('deliveryDate').value,
      placeSupply: document.getElementById('placeSupply').value, transportMode: document.getElementById('transportMode').value,
      chequeNo: document.getElementById('chequeNo').value, bankBranch: document.getElementById('bankBranch').value,
      cartage, taxable, cgst, sgst, igst, grandTotal, isDelhi, items
    };
  }

  // Build invoice HTML - NO NonNullList, NO stray text, stamp centred
  function buildInvoiceHTML(inv) {
    const { items, taxable, cgst, sgst, igst, grandTotal, isDelhi, cartage, customerName, custGstin, invoiceNo, invoiceDate, vehicleNo, deliveryDate, placeSupply, transportMode, stateCode, chequeNo, bankBranch, stateName } = inv;
    const words = numberToWords(grandTotal);
    let itemsRows = '';
    items.forEach(it => {
      itemsRows += `<tr>
        <td>${it.sno}</td>
        <td>${it.desc}</td>
        <td>${it.hsn}</td>
        <td>${it.qty}</td>
        <td>₹ ${parseFloat(it.rate).toFixed(2)}</td>
        <td>₹ ${it.amount}</td>
      </tr>`;
    });
    let gstBreakdown = '';
    if (isDelhi) {
      gstBreakdown = `<tr><td style="text-align:left;">CGST @9%</td><td>₹ ${cgst.toFixed(2)}</td></tr>
                      <tr><td style="text-align:left;">SGST @9%</td><td>₹ ${sgst.toFixed(2)}</td></tr>`;
    } else {
      gstBreakdown = `<tr><td style="text-align:left;">IGST @18%</td><td>₹ ${igst.toFixed(2)}</td></tr>`;
    }
    const stampTransform = getRandomStampTransform();
    const stampSVG = `
      <div class="stamp-container">
        <svg class="stamp-svg" viewBox="0 0 100 100" style="transform: ${stampTransform};">
          <circle cx="50" cy="50" r="46" fill="none" stroke="#1e3a8a" stroke-width="2.5" stroke-dasharray="3 2"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="#1e3a8a" stroke-width="1.5"/>
          <text x="50" y="42" text-anchor="middle" fill="#1e3a8a" font-size="9" font-weight="bold" font-family="monospace">AV TECHNOLOGY</text>
          <text x="50" y="55" text-anchor="middle" fill="#1e3a8a" font-size="7" font-family="monospace">DELHI • APPROVED</text>
          <line x1="25" y1="68" x2="75" y2="68" stroke="#1e3a8a" stroke-width="0.8"/>
          <text x="50" y="78" text-anchor="middle" fill="#1e3a8a" font-size="6" font-family="monospace">AUTHORISED</text>
        </svg>
      </div>
    `;
    return `
      <div style="font-family:'Segoe UI',Roboto,sans-serif;" id="invoiceContent">
        <div style="text-align:center;"><div class="tax-invoice-title">TAX INVOICE</div></div>
        <div class="brand-header">
          <div class="brand-name">AV TECHNOLOGY</div>
          <div class="brand-tag">PROJECTORS | VIDEO CAMERA | LED VIDEO WALLS | SPARE PARTS</div>
          <div class="company-details">20 PART 2 SAINIK VIHAR MOHAN GARDEN UTTAM NAGAR NEW DELHI -59<br>📞 +91 9711166056  ✉ avtechnologyy@gmail.com</div>
        </div>
        <div class="info-grid-pro">
          <div class="info-left">
            <div class="info-row"><span class="info-label">M/S (Customer):</span><span class="info-value customer-name-cap">${customerName}</span></div>
            <div class="info-row"><span class="info-label">GSTIN NO:</span><span class="info-value">${custGstin || '—'}</span></div>
            <div class="info-row"><span class="info-label">State:</span><span class="info-value">${stateName} (Code: ${stateCode || '—'})</span></div>
            <div class="info-row"><span class="info-label">Place of Supply:</span><span class="info-value">${placeSupply || '—'}</span></div>
            <div class="info-row"><span class="info-label">Vehicle No:</span><span class="info-value">${vehicleNo || '—'}</span></div>
            <div class="info-row"><span class="info-label">Delivery Date:</span><span class="info-value">${deliveryDate || '—'}</span></div>
          </div>
          <div class="info-right">
            <div class="info-row"><span class="info-label">GSTIN:</span><span class="info-value">07ABIFA3151F1ZS</span></div>
            <div class="info-row"><span class="info-label">STATE CODE:</span><span class="info-value">07</span></div>
            <div class="info-row"><span class="info-label">INVOICE NO:</span><span class="info-value">${invoiceNo}</span></div>
            <div class="info-row"><span class="info-label">DATE:</span><span class="info-value">${invoiceDate}</span></div>
            <div class="info-row"><span class="info-label">Transport Mode:</span><span class="info-value">${transportMode || '—'}</span></div>
            <div class="info-row"><span class="info-label">Cheque No:</span><span class="info-value">${chequeNo || '—'}</span></div>
            <div class="info-row"><span class="info-label">Bank/Branch:</span><span class="info-value">${bankBranch || '—'}</span></div>
          </div>
        </div>
        <table class="items-table-preview"><thead><tr><th>S.No</th><th>PARTICULAR</th><th>HSN</th><th>QTY</th><th>RATE</th><th>AMOUNT</th></tr></thead><tbody>${itemsRows}</tbody>追赶
        <div style="text-align:right; font-weight:600;">TAXABLE VALUE: ₹ ${taxable.toFixed(2)}</div>
        <div class="word-amount"><strong>AMOUNT IN WORDS:</strong> ${words}</div>
        <table style="width:100%; margin:12px 0; border-collapse:collapse;">${gstBreakdown}<tr><td style="text-align:left;"><strong>CARTAGE (Labour & others)</strong></td><td><strong>₹ ${cartage.toFixed(2)}</strong></td></tr><tr class="total-row"><td style="text-align:left;"><strong>TOTAL SALE VALUE WITH GST</strong></td><td><strong>₹ ${grandTotal.toFixed(2)}</strong></td></tr></table>

        <div class="stamp-sign-wrapper">
          ${stampSVG}

            FOR AV TECHNOLOGY<br>
            <span style="border-top:2px dashed #1f2937; display:inline-block; width:170px; margin-top:6px;"></span><br>
            AUTHORISED SIGNATORY
          </div>

        <div style="text-align:center; font-size:8px; margin-top:12px;">E. & O. E.</div>
      </div>`;
  }

  // Auto increment invoice number
  async function setNextInvoiceNumber() {
    try {
      const res = await fetch(`${SCRIPT_URL}?action=getLast`);
      const json = await res.json();
      const lastInv = json.lastNo;
      if (lastInv && lastInv !== "INV-26/000") {
        const match = lastInv.match(/INV-(\d{2})\/(\d{3})/);
        if (match) {
          let year = match[1];
          let num = parseInt(match[2]);
          let currentYear = new Date().getFullYear().toString().slice(-2);
          if (year !== currentYear) {
            document.getElementById('invoiceNoManual').value = `INV-${currentYear}/001`;
          } else {
            let nextNum = (num + 1).toString().padStart(3, '0');
            document.getElementById('invoiceNoManual').value = `INV-${currentYear}/${nextNum}`;
          }
        } else {
          document.getElementById('invoiceNoManual').value = `INV-${new Date().getFullYear().toString().slice(-2)}/001`;
        }
      } else {
        document.getElementById('invoiceNoManual').value = `INV-${new Date().getFullYear().toString().slice(-2)}/001`;
      }
    } catch(e) {
      document.getElementById('invoiceNoManual').value = `INV-${new Date().getFullYear().toString().slice(-2)}/001`;
    }
  }

  // Print / Save as PDF (reliable)
  function printInvoice() {
    const element = document.getElementById('invoiceContent');
    if (!element) {
      alert("No invoice to print. Please generate an invoice first.");
      return;
    }
    window.print();
  }

  // Load last 10 invoices
  async function loadInvoiceList() {
    const container = document.getElementById('invoiceListContainer');
    container.innerHTML = "Loading invoices...";
    try {
      const res = await fetch(`${SCRIPT_URL}?action=getAll`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const invoices = await res.json();
      if (!Array.isArray(invoices)) throw new Error("Invalid response");
      allInvoices = invoices.slice(-10).reverse();
      renderInvoiceList(allInvoices);
    } catch(e) {
      container.innerHTML = `<div style="color:red; padding:20px; text-align:center;">⚠️ Failed to load invoices: ${e.message}<br><small>Make sure Apps Script has 'getAll' action.</small></div>`;
    }
  }
  function renderInvoiceList(invoices) {
    const container = document.getElementById('invoiceListContainer');
    if (!invoices.length) { container.innerHTML = "No invoices found."; return; }
    let html = '<div class="invoice-list"><h3>📋 Last 10 Invoices</h3>';
    invoices.forEach(inv => {
      html += `
        <div class="invoice-card">
          <div class="invoice-card-header">
            <div><strong>${inv.invoiceNo}</strong> | ${inv.customerName} | ₹ ${inv.grandTotal}</div>
            <div class="invoice-actions">
              <button onclick="viewInvoice('${inv.invoiceNo}')">👁️ View</button>
              <button onclick="printInvoiceFromList('${inv.invoiceNo}')">🖨️ Print / PDF</button>
            </div>
          </div>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }
  async function viewInvoice(invoiceNo) {
    const res = await fetch(`${SCRIPT_URL}?invoiceNo=${encodeURIComponent(invoiceNo)}`);
    const data = await res.json();
    if (data.error === "NOT_FOUND") { alert("Invoice not found"); return; }
    const html = buildInvoiceHTML(data);
    const container = document.getElementById('pastInvoiceContainer');
    container.innerHTML = html;
    // Add Print/PDF button below the viewed invoice
    const btnDiv = document.createElement('div');
    btnDiv.className = 'print-button-container';
    btnDiv.innerHTML = '<button class="btn-print" onclick="window.printInvoice()">🖨️ Print / Save as PDF</button>';
    container.appendChild(btnDiv);
  }
  async function printInvoiceFromList(invoiceNo) {
    const res = await fetch(`${SCRIPT_URL}?invoiceNo=${encodeURIComponent(invoiceNo)}`);
    const data = await res.json();
    if (data.error === "NOT_FOUND") { alert("Invoice not found"); return; }
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = buildInvoiceHTML(data);
    const invoiceElem = tempDiv.firstChild;
    const printWindow = window.open('', '_blank');
    printWindow.document.write(`
      <html><head><title>AV TECHNOLOGY Invoice</title><style>${document.querySelector('style').innerHTML} body { margin: 0; padding: 0; }</style></head><body>${invoiceElem.outerHTML}</body></html>
    `);
    printWindow.document.close();
    printWindow.print();
  }
  function searchInvoices() {
    const query = document.getElementById('searchCustomerName').value.trim().toLowerCase();
    if (!query) renderInvoiceList(allInvoices);
    else {
      const filtered = allInvoices.filter(inv => inv.customerName.toLowerCase().includes(query));
      renderInvoiceList(filtered);
    }
  }

  // Save and generate (silent)
  async function saveAndGenerate() {
    const invoiceData = collectInvoiceData();
    if (!invoiceData) { alert("❌ Please fill Customer Name and at least one product."); return; }
    const finalHtml = buildInvoiceHTML(invoiceData);
    const previewDiv = document.getElementById('invoicePreview');
    previewDiv.innerHTML = finalHtml;
    previewDiv.style.display = 'block';
    if (!document.getElementById('previewActionButtons')) {
      const btnDiv = document.createElement('div');
      btnDiv.id = 'previewActionButtons';
      btnDiv.style.marginTop = '20px';
      btnDiv.style.display = 'flex';
      btnDiv.style.gap = '12px';
      btnDiv.innerHTML = `<button class="btn-print" id="printBtnMain">🖨️ Print / Save as PDF</button>`;
      previewDiv.appendChild(btnDiv);
      document.getElementById('printBtnMain').addEventListener('click', printInvoice);
    }
    fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(invoiceData) }).catch(e => console.error("Save error:", e));
    await setNextInvoiceNumber();
  }

  // Global print function for dynamic buttons
  window.printInvoice = printInvoice;

  // Initialization
  window.onload = async () => {
    renderItemsTable();
    updateStateCode();
    await setNextInvoiceNumber();
    document.getElementById('deliveryDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('placeSupply').value = "Delhi";
    document.getElementById('addRowBtn').onclick = addNewItem;
    document.getElementById('generateInvoiceBtn').onclick = saveAndGenerate;
    document.getElementById('resetFormBtn').onclick = () => location.reload();
    document.getElementById('stateName').oninput = updateStateCode;
    document.getElementById('refreshInvoiceList').onclick = loadInvoiceList;
    document.getElementById('searchCustomerName').oninput = searchInvoices;
    await loadInvoiceList();
  };
  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-pane'));
      if(btn.dataset.tab === 'create') document.getElementById('createTab').classList.add('active-pane');
      else document.getElementById('viewTab').classList.add('active-pane');
    });
  });
  // Expose global functions
  window.viewInvoice = viewInvoice;
  window.printInvoiceFromList = printInvoiceFromList;
  window.printInvoice = printInvoice;
</script>
</body>
</html>
