<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>AV TECHNOLOGY | Professional Invoice</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef2f8;
      font-family: 'Segoe UI', 'Roboto', 'Inter', system-ui, sans-serif;
      padding: 24px 16px;
      display: flex;
      justify-content: center;
    }

    /* Main card - A4 friendly */
    .app-container {
      max-width: 210mm;
      width: 100%;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 6px;
      background: #f9fbfd;
      padding: 14px 24px 0 24px;
      border-bottom: 2px solid #e2edf7;
    }
    .tab-btn {
      background: none;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 30px 30px 0 0;
      cursor: pointer;
      color: #2c3e66;
      font-family: inherit;
      transition: 0.2s;
    }
    .tab-btn.active {
      background: white;
      color: #0f3b5c;
      border-bottom: 3px solid #0f3b5c;
    }
    .tab-pane {
      display: none;
      padding: 28px 24px;
    }
    .tab-pane.active-pane {
      display: block;
    }

    /* Form grid - mobile responsive */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-bottom: 28px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-weight: 700;
      font-size: 0.75rem;
      color: #1e4a76;
      letter-spacing: 0.3px;
    }
    .field input, .field select {
      padding: 12px 14px;
      border: 1.5px solid #cbdbe6;
      border-radius: 18px;
      font-size: 0.9rem;
      background: white;
      font-family: inherit;
    }
    .field input:focus {
      outline: none;
      border-color: #1e4a76;
      box-shadow: 0 0 0 2px rgba(30,74,118,0.2);
    }

    /* Items table - scroll on mobile */
    .items-wrapper {
      overflow-x: auto;
      margin: 18px 0 12px;
      border-radius: 20px;
      border: 1px solid #e2edf2;
    }
    .items-table {
      width: 100%;
      min-width: 580px;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    .items-table th, .items-table td {
      border: 1px solid #cfdfed;
      padding: 10px 6px;
      text-align: center;
      vertical-align: middle;
    }
    .items-table th {
      background: #f0f6fe;
      font-weight: 800;
      color: #0f3b5c;
    }
    .items-table input {
      width: 100%;
      min-width: 80px;
      padding: 7px 4px;
      border: 1px solid #cbdbe6;
      border-radius: 14px;
      text-align: center;
    }
    .add-row-btn {
      background: #0f3b2c;
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 4px;
    }
    .remove-row {
      background: #b91c1c;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 5px 12px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Buttons */
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin: 28px 0 20px;
    }
    .btn-primary {
      background: #1e4a76;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-secondary {
      background: #4a5568;
    }

    /* INVOICE PREVIEW (A4 print) */
    .invoice-preview {
      background: white;
      margin-top: 30px;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 20px 24px;
    }
    @media print {
      body {
        background: white;
        padding: 0;
      }
      .app-container {
        max-width: 100%;
        box-shadow: none;
      }
      .tabs, .action-buttons, .add-row-btn, .remove-row, .tab-btn, .form-grid, .items-wrapper, .btn-primary, .btn-secondary {
        display: none !important;
      }
      .invoice-preview {
        padding: 0.2in;
        margin: 0;
        box-shadow: none;
      }
    }

    /* ========== PROFESSIONAL INVOICE STYLES ========== */
    .brand-header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 12px;
    }
    .brand-name {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: 1px;
      color: #003153;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }
    .brand-tag {
      font-size: 0.7rem;
      color: #2c5a7a;
      font-weight: 500;
      margin-top: 5px;
    }
    .company-details {
      font-size: 0.7rem;
      color: #2d3e50;
      text-align: center;
      margin-top: 6px;
    }
    /* Symmetrical info grid */
    .info-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      background: #fafcff;
      border-radius: 18px;
      padding: 12px 18px;
      margin: 16px 0;
      border: 1px solid #e9eef3;
    }
    .info-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 200px;
    }
    .info-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.8rem;
    }
    .info-label {
      font-weight: 800;
      color: #1f4a6e;
      min-width: 110px;
    }
    .info-value {
      font-weight: 600;
      color: #1f2937;
    }
    .customer-name-cap {
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.3px;
    }
    .items-table-preview {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.75rem;
    }
    .items-table-preview th, .items-table-preview td {
      border: 1px solid #cfdfed;
      padding: 8px 5px;
      text-align: center;
    }
    .word-amount {
      background: #eef2ff;
      padding: 8px 14px;
      border-radius: 28px;
      margin: 12px 0;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .total-row {
      background: #fef9e3;
      font-weight: 800;
    }
    /* Realistic stamp (India style) - blue circular, tilted near signature */
    .stamp-sign-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      margin-top: 35px;
      gap: 25px;
    }
    .real-stamp {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(30, 64, 175, 0.05);
      border: 3px double #1e40af;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 800;
      color: #1e3a8a;
      font-size: 0.75rem;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
      transform: rotate(-8deg);
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      backdrop-filter: blur(0.5px);
    }
    .real-stamp span:first-child {
      font-size: 0.85rem;
      letter-spacing: 1px;
      border-bottom: 1px solid #2563eb;
      padding-bottom: 4px;
      margin-bottom: 4px;
    }
    .signature-box {
      text-align: right;
      border-top: 2px dashed #4b5563;
      min-width: 180px;
      padding-top: 10px;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .terms {
      font-size: 0.7rem;
      background: #fef7e0;
      padding: 10px;
      border-radius: 16px;
      margin: 12px 0;
    }
    @media (max-width: 640px) {
      .tab-pane { padding: 18px 14px; }
      .info-grid { flex-direction: column; gap: 12px; }
      .real-stamp { width: 85px; height: 85px; font-size: 0.6rem; }
      .brand-name { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="tabs">
    <button class="tab-btn active" data-tab="create">📄 Create Invoice</button>
    <button class="tab-btn" data-tab="view">🔍 Retrieve Invoice</button>
  </div>

  <!-- CREATE INVOICE PANEL -->
  <div id="createTab" class="tab-pane active-pane">
    <div class="form-grid">
      <div class="field"><label>Invoice No. (Manual / Auto)</label><input type="text" id="invoiceNoManual" placeholder="INV-2025-001"></div>
      <div class="field"><label>Customer Name (M/S) *</label><input type="text" id="customerName" placeholder="M/s SHARMA ENTERPRISES"></div>
      <div class="field"><label>Customer GSTIN</label><input type="text" id="custGstin" placeholder="07ABCFG1234F1Z"></div>
      <div class="field"><label>State Name (auto code)</label><input type="text" id="stateName" placeholder="Delhi" value="Delhi"></div>
      <div class="field"><label>State Code</label><input type="text" id="stateCode" placeholder="07" readonly style="background:#f1f5f9;"></div>
      <div class="field"><label>Vehicle No.</label><input type="text" id="vehicleNo" placeholder="DL 01 AB 5678"></div>
      <div class="field"><label>Date of Delivery</label><input type="date" id="deliveryDate"></div>
      <div class="field"><label>Place of Supply</label><input type="text" id="placeSupply" placeholder="New Delhi"></div>
      <div class="field"><label>Transport Mode</label><input type="text" id="transportMode" placeholder="Road / Van"></div>
      <div class="field"><label>Cheque No.</label><input type="text" id="chequeNo"></div>
      <div class="field"><label>Bank & Branch</label><input type="text" id="bankBranch" placeholder="SBI, Main Branch"></div>
      <div class="field"><label>Cartage (₹) Labour & others</label><input type="number" id="cartage" value="0" step="1"></div>
    </div>

    <div style="font-weight:800; margin-bottom:6px;">📦 Invoice Items</div>
    <div class="items-wrapper">
      <table class="items-table" id="itemsTable">
        <thead><tr><th>S.No</th><th>PARTICULARS</th><th>HSN CODE</th><th>QTY</th><th>RATE (₹)</th><th>AMOUNT (₹)</th><th></th></tr></thead>
        <tbody id="itemsBody"></tbody>
      </table>
    </div>
    <button type="button" class="add-row-btn" id="addRowBtn">+ Add Product / Service</button>

    <div class="action-buttons">
      <button class="btn-primary" id="generateInvoiceBtn">💾 Generate & Save Invoice</button>
      <button class="btn-primary btn-secondary" id="resetFormBtn">⟳ Reset Fields</button>
    </div>

    <div id="invoicePreview" class="invoice-preview" style="display: none;"></div>
  </div>

  <!-- VIEW INVOICE TAB -->
  <div id="viewTab" class="tab-pane">
    <div class="form-grid">
      <div class="field"><label>Enter Invoice Number</label><input type="text" id="searchInvNo" placeholder="e.g., INV-1744287600000"></div>
    </div>
    <button class="btn-primary" id="fetchInvoiceBtn">🔎 Load Invoice</button>
    <div id="pastInvoiceContainer" style="margin-top: 30px;"></div>
  </div>
</div>

<script>
  // ================== CONFIGURATION ==================
  // Replace with your Google Apps Script URL after deployment
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_REPLACE_ME/exec"; 
  const USE_MOCK = false;   // set to false after configuring Apps Script

  // ---------- Helper: Number to Indian Rupees Words ----------
  function numberToWords(num) {
    if (num === 0) return "Zero Rupees Only";
    const ones = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine", "Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
    const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
    function convertLessThanThousand(n) {
      if (n === 0) return "";
      if (n < 20) return ones[n] + " ";
      if (n < 100) return tens[Math.floor(n/10)] + " " + (n%10 !== 0 ? ones[n%10] + " " : "");
      return ones[Math.floor(n/100)] + " Hundred " + (n%100 !== 0 ? convertLessThanThousand(n%100) : "");
    }
    let rupees = Math.floor(num);
    let paise = Math.round((num - rupees) * 100);
    let result = "";
    if (rupees >= 10000000) result += convertLessThanThousand(Math.floor(rupees/10000000)) + "Crore ";
    rupees %= 10000000;
    if (rupees >= 100000) result += convertLessThanThousand(Math.floor(rupees/100000)) + "Lakh ";
    rupees %= 100000;
    if (rupees >= 1000) result += convertLessThanThousand(Math.floor(rupees/1000)) + "Thousand ";
    rupees %= 1000;
    if (rupees >= 100) result += convertLessThanThousand(Math.floor(rupees/100)) + "Hundred ";
    rupees %= 100;
    if (rupees > 0) result += convertLessThanThousand(rupees);
    result = result.trim() + " Rupees";
    if (paise > 0) result += " and " + convertLessThanThousand(paise).trim() + " Paise";
    return result + " Only";
  }

  // Items management
  let itemsRowCount = 1;
  function renderItemRows() {
    const tbody = document.getElementById('itemsBody');
    tbody.innerHTML = '';
    for (let i = 0; i < itemsRowCount; i++) {
      const row = tbody.insertRow();
      row.insertCell(0).innerText = i+1;
      row.insertCell(1).innerHTML = `<input type="text" id="item_${i}_desc" placeholder="Product / Service" style="min-width:110px;">`;
      row.insertCell(2).innerHTML = `<input type="text" id="item_${i}_hsn" placeholder="HSN">`;
      row.insertCell(3).innerHTML = `<input type="number" id="item_${i}_qty" value="1" step="1" min="0">`;
      row.insertCell(4).innerHTML = `<input type="number" id="item_${i}_rate" value="0" step="1" min="0">`;
      row.insertCell(5).innerHTML = `<span id="item_${i}_amount">0</span>`;
      const delCell = row.insertCell(6);
      if (itemsRowCount > 1) {
        const delBtn = document.createElement('button');
        delBtn.innerText = '✖';
        delBtn.className = 'remove-row';
        delBtn.onclick = (function(idx) { return function() { removeRow(idx); }; })(i);
        delCell.appendChild(delBtn);
      }
    }
    attachItemEvents();
  }

  function removeRow(idx) {
    if (itemsRowCount <= 1) return;
    itemsRowCount--;
    renderItemRows();
    triggerPreviewUpdate();
  }

  function attachItemEvents() {
    for (let i=0; i<itemsRowCount; i++) {
      const qtyEl = document.getElementById(`item_${i}_qty`);
      const rateEl = document.getElementById(`item_${i}_rate`);
      if (qtyEl) qtyEl.addEventListener('input', () => updateItemAmount(i));
      if (rateEl) rateEl.addEventListener('input', () => updateItemAmount(i));
    }
  }

  function updateItemAmount(idx) {
    const qty = parseFloat(document.getElementById(`item_${idx}_qty`)?.value) || 0;
    const rate = parseFloat(document.getElementById(`item_${idx}_rate`)?.value) || 0;
    const amt = qty * rate;
    const span = document.getElementById(`item_${idx}_amount`);
    if (span) span.innerText = amt.toFixed(2);
    triggerPreviewUpdate();
  }

  function getItemsArray() {
    let items = [];
    for (let i=0; i<itemsRowCount; i++) {
      let desc = document.getElementById(`item_${i}_desc`)?.value || '';
      let hsn = document.getElementById(`item_${i}_hsn`)?.value || '';
      let qty = parseFloat(document.getElementById(`item_${i}_qty`)?.value) || 0;
      let rate = parseFloat(document.getElementById(`item_${i}_rate`)?.value) || 0;
      let amount = qty * rate;
      items.push({ sno: i+1, desc, hsn, qty, rate, amount: amount.toFixed(2) });
    }
    return items;
  }

  // Auto state code based on state name (Delhi = 07)
  function updateStateCode() {
    const stateName = document.getElementById('stateName').value.trim().toLowerCase();
    const codeField = document.getElementById('stateCode');
    if (stateName.includes('delhi')) codeField.value = '07';
    else codeField.value = '';
    triggerPreviewUpdate();
  }

  let previewTimeout;
  function triggerPreviewUpdate() {
    if (previewTimeout) clearTimeout(previewTimeout);
    previewTimeout = setTimeout(() => {
      const previewDiv = document.getElementById('invoicePreview');
      if (previewDiv.style.display === 'block') generatePreviewOnly();
    }, 300);
  }

  function generatePreviewOnly() {
    const invData = collectInvoiceData();
    if (invData) {
      document.getElementById('invoicePreview').innerHTML = buildInvoiceHTML(invData);
    }
  }

  function collectInvoiceData() {
    const customerNameRaw = document.getElementById('customerName').value.trim();
    if (!customerNameRaw) return null;
    const items = getItemsArray().filter(it => it.desc.trim() !== "");
    if (items.length === 0) return null;
    const taxable = items.reduce((s,i)=> s+parseFloat(i.amount),0);
    let stateCodeVal = document.getElementById('stateCode').value.trim();
    const isDelhi = (stateCodeVal === "07");
    let cgst=0, sgst=0, igst=0;
    if(isDelhi){ cgst = taxable*0.09; sgst = taxable*0.09; } 
    else { igst = taxable*0.18; }
    const cartage = parseFloat(document.getElementById('cartage').value) || 0;
    const grandTotal = taxable + cgst + sgst + igst + cartage;
    let invoiceNo = document.getElementById('invoiceNoManual').value.trim();
    if (invoiceNo === "") invoiceNo = "INV-" + Date.now();
    const today = new Date().toLocaleDateString('en-IN');
    return {
      invoiceNo, invoiceDate: today, customerName: customerNameRaw.toUpperCase(),
      custGstin: document.getElementById('custGstin').value,
      stateCode: stateCodeVal, stateName: document.getElementById('stateName').value,
      vehicleNo: document.getElementById('vehicleNo').value, deliveryDate: document.getElementById('deliveryDate').value,
      placeSupply: document.getElementById('placeSupply').value, transportMode: document.getElementById('transportMode').value,
      chequeNo: document.getElementById('chequeNo').value, bankBranch: document.getElementById('bankBranch').value,
      cartage, taxable, cgst, sgst, igst, grandTotal, isDelhi, items
    };
  }

  function buildInvoiceHTML(inv) {
    const { items, taxable, cgst, sgst, igst, grandTotal, isDelhi, cartage, customerName, custGstin, invoiceNo, invoiceDate, vehicleNo, deliveryDate, placeSupply, transportMode, stateCode, chequeNo, bankBranch, stateName } = inv;
    const words = numberToWords(grandTotal);
    let itemsRows = '';
    items.forEach(it => {
      itemsRows += `<tr><td>${it.sno}</td><td>${it.desc}</td><td>${it.hsn}</td><td>${it.qty}</td><td>₹ ${parseFloat(it.rate).toFixed(2)}</td><td>₹ ${it.amount}</td></tr>`;
    });
    let gstBreakdown = '';
    if (isDelhi) {
      gstBreakdown = `<tr><td style="text-align:left;">CGST @9%</td><td>₹ ${cgst.toFixed(2)}</td></tr>
                      <tr><td style="text-align:left;">SGST @9%</td><td>₹ ${sgst.toFixed(2)}</td></tr>`;
    } else {
      gstBreakdown = `<tr><td style="text-align:left;">IGST @18%</td><td>₹ ${igst.toFixed(2)}</td></tr>`;
    }
    return `
      <div style="font-family:'Segoe UI',Roboto,sans-serif;">
        <div class="brand-header">
          <div class="brand-name">AV TECHNOLOGY</div>
          <div class="brand-tag">PROJECTORS | VIDEO CAMERA | LED VIDEO WALLS | SPARE PARTS</div>
          <div class="company-details">20 PART 2 SAINIK VIHAR MOHAN GARDEN UTTAM NAGAR NEW DELHI -59<br>📞 +91 9711166056  ✉ avtechnologyy@gmail.com</div>
        </div>
        
        <!-- Symmetrical info grid -->
        <div class="info-grid">
          <div class="info-block">
            <div class="info-row"><span class="info-label">GSTIN:</span><span class="info-value">07ABIFA3151F1ZS</span></div>
            <div class="info-row"><span class="info-label">STATE CODE:</span><span class="info-value">07</span></div>
            <div class="info-row"><span class="info-label">INVOICE NO:</span><span class="info-value">${invoiceNo}</span></div>
            <div class="info-row"><span class="info-label">DATE:</span><span class="info-value">${invoiceDate}</span></div>
          </div>
          <div class="info-block">
            <div class="info-row"><span class="info-label">M/S:</span><span class="info-value customer-name-cap">${customerName}</span></div>
            <div class="info-row"><span class="info-label">GSTIN NO:</span><span class="info-value">${custGstin || '—'}</span></div>
            <div class="info-row"><span class="info-label">State:</span><span class="info-value">${stateName} (Code:${stateCode || '—'})</span></div>
          </div>
          <div class="info-block">
            <div class="info-row"><span class="info-label">VEHICLE NO:</span><span class="info-value">${vehicleNo || '—'}</span></div>
            <div class="info-row"><span class="info-label">DELIVERY DATE:</span><span class="info-value">${deliveryDate || '—'}</span></div>
            <div class="info-row"><span class="info-label">PLACE OF SUPPLY:</span><span class="info-value">${placeSupply || '—'}</span></div>
            <div class="info-row"><span class="info-label">TRANSPORT MODE:</span><span class="info-value">${transportMode || '—'}</span></div>
          </div>
          <div class="info-block">
            <div class="info-row"><span class="info-label">CHEQUE NO:</span><span class="info-value">${chequeNo || '—'}</span></div>
            <div class="info-row"><span class="info-label">BANK/BRANCH:</span><span class="info-value">${bankBranch || '—'}</span></div>
          </div>
        </div>

        <table class="items-table-preview">
          <thead><tr><th>S.No</th><th>PARTICULAR</th><th>HSN</th><th>QTY</th><th>RATE</th><th>AMOUNT</th></tr></thead>
          <tbody>${itemsRows}</tbody>
        </table>
        
        <div style="text-align:right; font-weight:600;">TAXABLE VALUE: ₹ ${taxable.toFixed(2)}</div>
        <div class="word-amount"><strong>AMOUNT IN WORDS:</strong> ${words}</div>
        
        <table style="width:100%; margin:12px 0; border-collapse:collapse;">
          ${gstBreakdown}
          <tr><td style="text-align:left;"><strong>CARTAGE (Labour & others)</strong></td><td><strong>₹ ${cartage.toFixed(2)}</strong></td></tr>
          <tr class="total-row"><td style="text-align:left;"><strong>TOTAL SALE VALUE WITH GST</strong></td><td><strong>₹ ${grandTotal.toFixed(2)}</strong></td></tr>
        </table>
        
        <div class="terms">
          <strong>TERMS & CONDITIONS:</strong><br>
          1. IF THE BILL IS NOT PAID ON DUE DATE INTEREST 18% P.A WILL BE CHARGED.<br>
          2. ALL DISPUTES SUBJECT TO DELHI JURISDICTION ONLY.<br>

  async function saveAndGenerate() {
    const invoiceData = collectInvoiceData();
    if (!invoiceData) { alert("❌ Please fill Customer Name and at least one product."); return; }
    const finalHtml = buildInvoiceHTML(invoiceData);
    const previewDiv = document.getElementById('invoicePreview');
    previewDiv.innerHTML = finalHtml;
    previewDiv.style.display = 'block';
    
    if (!USE_MOCK && SCRIPT_URL.includes("REPLACE_ME")) {
      alert("⚠️ Google Apps Script URL not configured. Invoice preview ready but not saved to cloud.\nReplace SCRIPT_URL in code after deploying Apps Script.");
    } else if (!USE_MOCK) {
      try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(invoiceData) });
        alert(`✅ Invoice ${invoiceData.invoiceNo} saved to Google Sheet!`);
      } catch(e) { alert("Cloud save failed, but invoice is generated."); }
    } else {
      localStorage.setItem(invoiceData.invoiceNo, JSON.stringify(invoiceData));
      alert(`📌 Demo save: ${invoiceData.invoiceNo} stored locally.`);
    }
    window.open(`https://wa.me/?text=🧾 *AV TECHNOLOGY INVOICE*%0ANo: ${invoiceData.invoiceNo}%0ATotal: ₹${invoiceData.grandTotal.toFixed(2)}%0ACustomer: ${invoiceData.customerName}`, '_blank');
  }

  // Event binding
  document.getElementById('addRowBtn').addEventListener('click', () => { itemsRowCount++; renderItemRows(); triggerPreviewUpdate(); });
  document.getElementById('generateInvoiceBtn').addEventListener('click', saveAndGenerate);
  document.getElementById('resetFormBtn').addEventListener('click', () => { location.reload(); });
  document.getElementById('stateName').addEventListener('input', updateStateCode);
  document.getElementById('fetchInvoiceBtn').addEventListener('click', async () => {
    const invNo = document.getElementById('searchInvNo').value.trim();
    if(!invNo) return alert("Enter Invoice Number");
    if(!USE_MOCK && !SCRIPT_URL.includes("REPLACE_ME")) {
      alert("For retrieval, implement doGet in Apps Script or enable mock mode.");
    } else if(USE_MOCK){
      const data = localStorage.getItem(invNo);
      if(data) document.getElementById('pastInvoiceContainer').innerHTML = buildInvoiceHTML(JSON.parse(data));
      else document.getElementById('pastInvoiceContainer').innerHTML = "<p style='color:red;'>❌ Invoice not found locally</p>";
    } else {
      alert("Configure GET endpoint or use mock mode for testing.");
    }
  });

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active-pane'));
      if(btn.dataset.tab === 'create') document.getElementById('createTab').classList.add('active-pane');
      else document.getElementById('viewTab').classList.add('active-pane');
    });
  });

  renderItemRows();
  updateStateCode();
  document.getElementById('deliveryDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('placeSupply').value = "Delhi";
</script>
